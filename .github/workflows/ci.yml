name: CI Build

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'
    
    - name: Restore dependencies
      run: dotnet restore "CyberSecurity ChatBot/CyberSecurity ChatBot.csproj"
    
    - name: Build
      run: dotnet build "CyberSecurity ChatBot/CyberSecurity ChatBot.csproj" --configuration Release --no-restore
    
    - name: Test
      run: dotnet test "CyberSecurity ChatBot/CyberSecurity ChatBot.csproj" --no-build --configuration Release --verbosity normal
      continue-on-error: true
